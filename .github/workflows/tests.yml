name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > CryptoTest/GoogleService-Info.plist

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project CryptoTest.xcodeproj -scheme CryptoTest

      - name: Run tests
        run: |
          xcodebuild test \
            -project CryptoTest.xcodeproj \
            -scheme CryptoTest \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipMacroValidation
